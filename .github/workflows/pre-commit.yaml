name: pre-commit
on:
  push:
    branches: [main]
  pull_request:
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Create venv and install dependencies
        run: uv sync
        working-directory: connect_4_RL
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Debug venv
        run: |
          echo "=== .venv exists ==="
          ls connect_4_RL/.venv/lib/python3.12/site-packages/ | grep -E "numpy|matplotlib|pygame"
          echo "=== pyproject.toml pyright section ==="
          cat connect_4_RL/pyproject.toml | grep -A5 "pyright"
          echo "=== working dir when pre-commit runs ==="
          pwd
        working-directory: connect_4_RL
      - name: Run pre-commit
        run: pre-commit run --all-files
        working-directory: connect_4_RL
